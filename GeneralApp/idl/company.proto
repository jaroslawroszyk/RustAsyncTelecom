syntax = "proto3";

package itf;

message AddUserReq {
    uint32 user_id = 1;
    string user_name = 2;
}
message AddUserResp {
    uint32 user_id = 1;
    string user_name = 2;
}

message HeartbeatReq {
    string message = 1;
}

message HeartbeatResp {
    string message = 1;
}

message SomeMsg {
    oneof msgtype {
        HeartbeatReq HeartbeatReq = 1;
        HeartbeatResp HeartbeatResp = 2;
        AddUserReq add_user_req = 3;
        AddUserResp add_user_resp = 4; 
    }
}